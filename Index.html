window.doRegister = async function() {
  const storeName = document.getElementById('reg-store').value.trim();
  const email = document.getElementById('reg-email').value.trim();
  const pass = document.getElementById('reg-pass').value;
  const role = document.getElementById('reg-role').value;

  if (!storeName || !email || !pass) { showToast('Completa todos los campos'); return; }
  if (pass.length < 6) { showToast('La contraseña debe tener al menos 6 caracteres'); return; }

  setAuthLoading(true);

  if (DEMO_MODE) {
    // Demo: guardar en localStorage
    const uid = 'demo_' + Date.now();
    localStorage.setItem('sb_user', JSON.stringify({uid, email, storeName, role}));
    products = SAMPLE.map(p => ({...p}));
    sales = JSON.parse(localStorage.getItem('sb_sales_demo') || '[]');
    storeData = {storeName, role, uid};
    launchApp(storeName, role);
    return;
  }

  try {
    const cred = await createUserWithEmailAndPassword(auth, email, pass);
    const uid = cred.user.uid;
    await setDoc(doc(db, 'stores', uid), {
      storeName, email, role, uid,
      createdAt: serverTimestamp(),
      plan: 'basico'
    });
    storeData = {storeName, role, uid};
    await seedProducts(uid);
    setupListeners(uid, role);
    launchApp(storeName, role);
  } catch(e) {
    showToast(firebaseError(e.code));
  } finally {
    setAuthLoading(false);
  }
};

window.doLogin = async function() {
  const email = document.getElementById('login-email').value.trim();
  const pass = document.getElementById('login-pass').value;
  const role = document.getElementById('login-role').value;

  if (!email || !pass) { showToast('Ingresa email y contraseña'); return; }
  setAuthLoading(true);

  if (DEMO_MODE) {
    const saved = JSON.parse(localStorage.getItem('sb_user') || 'null');
    if (saved && saved.email === email) {
      products = JSON.parse(localStorage.getItem('sb_products_demo') || JSON.stringify(SAMPLE.map(p=>({...p}))));
      sales = JSON.parse(localStorage.getItem('sb_sales_demo') || '[]');
      storeData = {storeName: saved.storeName, role, uid: saved.uid};
      launchApp(saved.storeName, role);
    } else {
      showToast('Usuario no encontrado en demo');
    }
    setAuthLoading(false);
    return;
  }

  try {
    const cred = await signInWithEmailAndPassword(auth, email, pass);
    const uid = cred.user.uid;
    const snap = await getDoc(doc(db, 'stores', uid));
    if (!snap.exists()) throw new Error('store-not-found');
    storeData = {...snap.data(), role};
    setupListeners(uid, role);
    launchApp(storeData.storeName, role);
  } catch(e) {
    showToast(firebaseError(e.code || e.message));
  } finally {
    setAuthLoading(false);
  }
};

window.doLogout = async function() {
  if (unsubProducts) unsubProducts();
  if (unsubSales) unsubSales();
  if (!DEMO_MODE) await signOut(auth);
  cart = [];
  products = [];
  sales = [];
  storeData = null;
  document.getElementById('app').classList.add('hidden');
  document.getElementById('auth-screen').classList.remove('hidden');
  showAuthTab('login');
};

async function seedProducts(uid) {
  const col = collection(db, 'stores', uid, 'products');
  for (const p of SAMPLE) {
    const {id, ...data} = p;
    await addDoc(col, {...data, createdAt: serverTimestamp()});
  }
}

function setupListeners(uid, role) {
  // Products — real-time
  unsubProducts = onSnapshot(
    collection(db, 'stores', uid, 'products'),
    snap => {
      products = snap.docs.map(d => ({id: d.id, ...d.data()}));
      refreshCurrentView();
      updateAlertBadge();
    }
  );
  // Sales — real-time
  const salesQ = query(collection(db, 'stores', uid, 'sales'), orderBy('createdAt','desc'), limit(100));
  unsubSales = onSnapshot(salesQ, snap => {
    sales = snap.docs.map(d => ({id: d.id, ...d.data()}));
    refreshCurrentView();
  });
}

function firebaseError(code) {
  const map = {
    'auth/email-already-in-use': 'Ese email ya está registrado',
    'auth/invalid-email': 'Email inválido',
    'auth/weak-password': 'Contraseña muy débil (mín 6 caracteres)',
    'auth/wrong-password': 'Contraseña incorrecta',
    'auth/user-not-found': 'Usuario no encontrado',
    'auth/invalid-credential': 'Email o contraseña incorrectos',
    'store-not-found': 'Negocio no encontrado',
  };
  return map[code] || 'Error: ' + code;
}

// APP

function launchApp(storeName, role) {
  document.getElementById('auth-screen').classList.add('hidden');
  document.getElementById('app').classList.remove('hidden');
  document.getElementById('tb-name').textContent = storeName;
  document.getElementById('tb-mode').textContent = DEMO_MODE ? '💾 demo' : '☁️ en línea';
  document.getElementById('tb-mode').style.color = DEMO_MODE ? 'var(--muted)' : 'var(--ok)';
  renderNav(role);
  if (role === 'vendor') switchView('vender');
  else switchView('dashboard');
  document.addEventListener('keydown', handleGun);
}

function renderNav(role) {
  const nav = document.getElementById('bottom-nav');
  if (role === 'vendor') {
    nav.innerHTML = `
      <button class="nv active" id="nav-vender" onclick="switchView('vender')"><span>🛍️</span>Vender</button>
      <button class="nv" id="nav-scan" onclick="openScanner('sell')"><span>📷</span>Escanear</button>`;
  } else {
    nav.innerHTML = `
      <button class="nv active" id="nav-dashboard" onclick="switchView('dashboard')"><span>📊</span>Resumen</button>
      <button class="nv" id="nav-alertas" onclick="switchView('alertas')"><span>🚨</span>Alertas<i class="nbadge" id="alert-badge" style="display:none"></i></button>
      <button class="nv" id="nav-inventario" onclick="switchView('inventario')"><span>📦</span>Stock</button>
      <button class="nv" id="nav-historial" onclick="switchView('historial')"><span>📋</span>Ventas</button>`;
  }
}

window.switchView = function(v) {
  currentView = v;
  document.querySelectorAll('.nv').forEach(n => n.classList.remove('active'));
  const btn = document.getElementById('nav-' + v);
  if (btn) btn.classList.add('active');
  const c = document.getElementById('main-content');
  if (v === 'vender') renderVender(c);
  else if (v === 'dashboard') renderDashboard(c);
  else if (v === 'alertas') renderAlertas(c);
  else if (v === 'inventario') renderInventario(c);
  else if (v === 'historial') renderHistorial(c);
};

function refreshCurrentView() { if (currentView) switchView(currentView); }

          <div class="sbox"><span style="color:var(--muted);font-size:1.1rem">🔍</span>

          </div>
          <button class="scan-btn" onclick="openScanner('sell')">📷</button>
        </div>

          </div>

          <div>
            <div style="font-size:.72rem;color:var(--muted)">Total a cobrar</div>
            <div style="font-family:'Syne',sans-serif;font-weight:800;font-size:1.7rem;color:var(--acc);line-height:1" id="cart-total">$0</div>

window.filterGrid = function() { renderGrid(document.getElementById('vsearch')?.value?.toLowerCase()||''); };

function renderGrid(filter='') {
  const el = document.getElementById('pgrid');
  if (!el) return;
  const list = products.filter(p => p.name.toLowerCase().includes(filter));
  if (!list.length) { el.innerHTML=`<div style="color:var(--muted);grid-column:1/-1;text-align:center;padding:2rem;font-size:.85rem">Sin resultados</div>`; return; }
  el.innerHTML = list.map(p => {
    const st = p.stock===0?'out':p.stock<=p.minStock?'low':'ok';
    return `<div class="pcard ${st}" onclick="addToCart('${p.id}')">
      <span class="pcard-badge ${st}">${st==='out'?'Sin stock':st==='low'?'¡Poco!':'✓'}</span>
      <div style="font-size:1.6rem;margin-bottom:.3rem">${p.emoji||'📦'}</div>
      <div class="pcard-name">${p.name}</div>
      <div class="pcard-price">${fmt(p.price)}</div>
      <div style="font-size:.72rem;color:var(--muted);margin-top:.2rem">Stock: ${p.stock}</div>
    </div>`;
  }).join('');
}

window.addToCart = function(id) {
  const p = products.find(x=>x.id==id);
  if (!p||p.stock===0) return;
  const inc = cart.find(x=>x.id==id);
  if (inc) { if (inc.qty>=p.stock){showToast('Sin más stock');return;} inc.qty++; }
  else cart.push({id:p.id,name:p.name,price:p.price,qty:1});
  renderCart();
};

window.changeQty = function(id,d) {
  const item = cart.find(x=>x.id==id);
  if (!item) return;
  item.qty+=d;
  if (item.qty<=0) cart=cart.filter(x=>x.id!=id);
  renderCart();
};

window.clearCart = function() { cart=[]; renderCart(); };

function renderCart() {
  const el=document.getElementById('cart-items');
  const cnt=document.getElementById('cart-cnt');
  const total=document.getElementById('cart-total');
  const btn=document.getElementById('cobrar-btn');
  if (!el) return;
  if (!cart.length) {
    el.innerHTML=`<div style="color:var(--muted);font-size:.82rem;text-align:center;padding:.5rem 0">Toca un producto para agregar ↑</div>`;
    if(cnt)cnt.textContent=''; if(total)total.textContent='$0'; if(btn)btn.disabled=true; return;
  }
  let sum=0;
  el.innerHTML=cart.map(item=>{
    sum+=item.price*item.qty;
    return `<div class="cart-item">
      <div style="flex:1;font-size:.85rem">${item.name}</div>
      <div style="display:flex;align-items:center;gap:.5rem">
        <button class="qb" onclick="changeQty('${item.id}',-1)">−</button>
        <span style="font-weight:700;min-width:18px;text-align:center">${item.qty}</span>
        <button class="qb" onclick="changeQty('${item.id}',1)">+</button>
        <span style="color:var(--acc);font-weight:600;min-width:55px;text-align:right;font-size:.85rem">${fmt(item.price*item.qty)}</span>
      </div>
    </div>`;
  }).join('');
  const tqty=cart.reduce((s,i)=>s+i.qty,0);
  if(cnt){cnt.textContent=tqty;cnt.style.display=tqty?'inline':'none';}
  if(total)total.textContent=fmt(sum);
  if(btn)btn.disabled=false;
}

window.openSaleModal = function() {
  const total=cart.reduce((s,i)=>s+i.price*i.qty,0);
  document.getElementById('ms-items').textContent=cart.map(i=>`${i.qty}× ${i.name}`).join(' · ');
  document.getElementById('ms-total').textContent=fmt(total);
  openModal('modal-sale');
};

window.completeSale = async function() {
  const total=cart.reduce((s,i)=>s+i.price*i.qty,0);
  const cost=cart.reduce((s,i)=>{const p=products.find(x=>x.id==i.id);return s+(p?p.cost*i.qty:0);},0);
  const uid=storeData.uid;

  if (DEMO_MODE) {
    products.forEach(p=>{ const c=cart.find(x=>x.id==p.id); if(c)p.stock-=c.qty; });
    sales.unshift({id:Date.now().toString(),items:[...cart],total,cost,createdAt:{seconds:Date.now()/1000}});
    localStorage.setItem('sb_products_demo',JSON.stringify(products));
    localStorage.setItem('sb_sales_demo',JSON.stringify(sales));
    cart=[];
    closeModal('modal-sale');
    renderCart();
    renderGrid(document.getElementById('vsearch')?.value?.toLowerCase()||'');
    updateAlertBadge();
    showToast('✓ Venta registrada');
    return;
  }

  for (const item of cart) {
    const p=products.find(x=>x.id==item.id);
    if (!p) continue;
    await updateDoc(doc(db,'stores',uid,'products',p.id),{stock:p.stock-item.qty});
  }
  await addDoc(collection(db,'stores',uid,'sales'),{
    items:cart.map(i=>({...i})),total,cost,createdAt:serverTimestamp()
  });
  cart=[];
  closeModal('modal-sale');
  showToast('✓ Venta registrada');
};

// ════════════════════════════════════════
// DASHBOARD
// ════════════════════════════════════════
function renderDashboard(c) {
  if(c) c.innerHTML=`<div style="padding:.85rem;display:flex;flex-direction:column;gap:1rem;overflow-y:auto" id="dash"></div>`;
  const el=document.getElementById('dash');
  if(!el)return;
  const today=new Date().toLocaleDateString('es-CL');
  const todaySales=sales.filter(s=>{
    const d=s.createdAt?.seconds?new Date(s.createdAt.seconds*1000):new Date(s.createdAt);
    return d.toLocaleDateString('es-CL')===today;
  });
  const income=todaySales.reduce((s,x)=>s+x.total,0);
  const costSold=todaySales.reduce((s,x)=>s+x.cost,0);
  const profit=income-costSold;
  const margin=income>0?Math.round((profit/income)*100):0;
  const invested=products.reduce((s,p)=>s+p.cost*p.stock,0);
  const alerts=products.filter(p=>p.stock<=p.minStock).length;

  el.innerHTML=`
    <div class="kpi-grid">
      <div class="kpi"><div class="kpi-l">Ingresos hoy</div><div class="kpi-v g">${fmt(income)}</div><div class="kpi-s">${todaySales.length} venta${todaySales.length!==1?'s':''}</div></div>
      <div class="kpi"><div class="kpi-l">Stock invertido</div><div class="kpi-v o">${fmt(invested)}</div><div class="kpi-s">valor inventario</div></div>
      <div class="kpi"><div class="kpi-l">Ganancia hoy</div><div class="kpi-v a">${fmt(profit)}</div><div class="kpi-s">margen ${margin}%</div></div>
      <div class="kpi"><div class="kpi-l">Alertas</div><div class="kpi-v r">${alerts}</div><div class="kpi-s">productos críticos</div></div>
    </div>
    <div class="sec-t">📈 Últimas ventas del día</div>
    ${todaySales.length===0
      ? `<div style="color:var(--muted);font-size:.85rem">Sin ventas hoy todavía.</div>`
      : todaySales.slice(0,5).map(s=>{
          const d=s.createdAt?.seconds?new Date(s.createdAt.seconds*1000):new Date(s.createdAt);
          return `<div class="sale-row">
            <div><div style="font-size:.72rem;color:var(--muted)">${d.toLocaleTimeString('es-CL',{hour:'2-digit',minute:'2-digit'})}</div>
            <div style="font-size:.85rem;margin-top:.1rem">${(s.items||[]).map(i=>`${i.qty}× ${i.name}`).join(', ')}</div></div>
            <div style="font-family:'Syne',sans-serif;font-weight:800;color:var(--ok)">${fmt(s.total)}</div>
          </div>`;
        }).join('')}`;
}

// ════════════════════════════════════════
// ALERTAS
// ════════════════════════════════════════
function renderAlertas(c) {
  if(c) c.innerHTML=`<div style="padding:.85rem;display:flex;flex-direction:column;gap:1rem;overflow-y:auto" id="alert-content"></div>`;
  const el=document.getElementById('alert-content');
  if(!el)return;
  const critical=products.filter(p=>p.stock===0);
  const low=products.filter(p=>p.stock>0&&p.stock<=p.minStock);
  const all=[...critical,...low];

  el.innerHTML=`
    <div>
      <div class="sec-t">⚡ Stock crítico</div>
      ${all.length===0
        ? `<div style="color:var(--ok);font-size:.88rem">✓ Todo el stock está bien</div>`
        : all.map(p=>`<div class="alert-item">
            <div class="adot ${p.stock===0?'r':'w'}"></div>
            <div style="flex:1"><div style="font-size:.88rem;font-weight:500">${p.emoji||'📦'} ${p.name}</div>
            <div style="font-size:.75rem;color:var(--muted);margin-top:.1rem">${p.stock===0?'Sin stock':`Solo ${p.stock} uds. (mín: ${p.minStock})`}</div></div>
            <div style="font-size:.75rem;font-weight:700;color:${p.stock===0?'var(--danger)':'var(--warn)'}">${p.stock===0?'URGENTE':'PRONTO'}</div>
          </div>`).join('')}
    </div>
    <div>
      <div class="sec-t">🛒 Lista de compras sugerida</div>
      ${all.length===0
        ? `<div style="color:var(--muted);font-size:.85rem">No hay compras urgentes.</div>`
        : all.map(p=>{
            const toBuy=Math.max(p.minStock*3-p.stock,p.minStock);
            return `<div class="buy-item">
              <div><div style="font-size:.88rem;font-weight:500">${p.emoji||'📦'} ${p.name}</div>
              <div style="font-size:.72rem;color:var(--muted)">Stock actual: ${p.stock}</div></div>
              <div style="text-align:right"><div style="font-family:'Syne',sans-serif;font-weight:800;color:var(--acc)">${toBuy} uds.</div>
              <div style="font-size:.72rem;color:var(--muted)">≈ ${fmt(toBuy*p.cost)}</div></div>
            </div>`;
          }).join('')}
    </div>`;
}

function updateAlertBadge() {
  const cnt=products.filter(p=>p.stock<=p.minStock).length;
  const b=document.getElementById('alert-badge');
  if(!b)return;
  b.textContent=cnt; b.style.display=cnt>0?'inline':'none';
}

function renderInventario(c) {

      <div style="flex:1;min-width:0">
        <div style="font-size:.88rem;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${p.name}</div>

      </div>
      <div style="display:flex;align-items:center;gap:.4rem;flex-shrink:0">
        <button class="qb" onclick="adjStock('${p.id}',-1)">−</button>
        <span style="font-family:'Syne',sans-serif;font-weight:800;font-size:1.05rem;min-width:28px;text-align:center;color:${p.stock===0?'var(--danger)':p.stock<=p.minStock?'var(--warn)':'var(--ok)'}">${p.stock}</span>
        <button class="qb" onclick="adjStock('${p.id}',1)">+</button>
      </div>
      <button onclick="editProduct('${p.id}')" style="background:none;border:none;color:var(--muted);cursor:pointer;font-size:1rem;margin-left:.2rem">✏️</button>
    </div>`).join('')
  +`<button class="add-p-btn" onclick="openAddProduct()">＋ Agregar producto</button>`;
}

window.adjStock = async function(id,d) {
  const p=products.find(x=>x.id==id);
  if(!p)return;
  const ns=Math.max(0,p.stock+d);
  if(DEMO_MODE){p.stock=ns;localStorage.setItem('sb_products_demo',JSON.stringify(products));}
  else await updateDoc(doc(db,'stores',storeData.uid,'products',p.id),{stock:ns});
  renderInventario();
  updateAlertBadge();
};

// ════════════════════════════════════════
// HISTORIAL
// ════════════════════════════════════════
function renderHistorial(c) {
  if(c) c.innerHTML=`<div style="padding:.85rem;display:flex;flex-direction:column;gap:.5rem;overflow-y:auto" id="hist-content"></div>`;
  const el=document.getElementById('hist-content');
  if(!el)return;
  if(!sales.length){el.innerHTML=`<div style="color:var(--muted);font-size:.85rem">Sin ventas aún.</div>`;return;}
  el.innerHTML=sales.slice(0,60).map(s=>{
    const d=s.createdAt?.seconds?new Date(s.createdAt.seconds*1000):new Date(s.createdAt||0);
    return `<div class="sale-row">
      <div><div style="font-size:.72rem;color:var(--muted)">${d.toLocaleDateString('es-CL')} ${d.toLocaleTimeString('es-CL',{hour:'2-digit',minute:'2-digit'})}</div>
      <div style="font-size:.85rem;margin-top:.1rem">${(s.items||[]).map(i=>`${i.qty}× ${i.name}`).join(', ')}</div></div>
      <div style="font-family:'Syne',sans-serif;font-weight:800;color:var(--ok);white-space:nowrap">${fmt(s.total)}</div>
    </div>`;
  }).join('');
}

// ════════════════════════════════════════
// PRODUCT MODAL
// ════════════════════════════════════════
window.openAddProduct = function() {
  editingProductId=null;
  document.getElementById('pm-title').textContent='Agregar producto';
  ['pm-name','pm-price','pm-cost','pm-stock','pm-min','pm-ean','pm-emoji'].forEach(id=>{const e=document.getElementById(id);if(e)e.value='';});
  openModal('modal-product');
};

window.editProduct = function(id) {
  const p=products.find(x=>x.id==id);
  if(!p)return;
  editingProductId=id;
  document.getElementById('pm-title').textContent='Editar producto';
  document.getElementById('pm-name').value=p.name;
  document.getElementById('pm-price').value=p.price;
  document.getElementById('pm-cost').value=p.cost;
  document.getElementById('pm-stock').value=p.stock;
  document.getElementById('pm-min').value=p.minStock;
  document.getElementById('pm-ean').value=p.ean||'';
  document.getElementById('pm-emoji').value=p.emoji||'';
  openModal('modal-product');
};

window.saveProduct = async function() {
  const name=document.getElementById('pm-name').value.trim();
  const price=parseFloat(document.getElementById('pm-price').value);
  const cost=parseFloat(document.getElementById('pm-cost').value);
  const stock=parseInt(document.getElementById('pm-stock').value);
  const minStock=parseInt(document.getElementById('pm-min').value);
  const ean=document.getElementById('pm-ean').value.trim();
  const emoji=document.getElementById('pm-emoji').value.trim()||'📦';
  if(!name||isNaN(price)||isNaN(cost)||isNaN(stock)||isNaN(minStock)){showToast('Completa todos los campos');return;}

  if(DEMO_MODE){
    if(editingProductId){const p=products.find(x=>x.id==editingProductId);Object.assign(p,{name,price,cost,stock,minStock,ean,emoji});}
    else products.push({id:Date.now().toString(),name,price,cost,stock,minStock,ean,emoji});
    localStorage.setItem('sb_products_demo',JSON.stringify(products));
  } else {
    const uid=storeData.uid;
    if(editingProductId) await updateDoc(doc(db,'stores',uid,'products',editingProductId),{name,price,cost,stock,minStock,ean,emoji});
    else await addDoc(collection(db,'stores',uid,'products'),{name,price,cost,stock,minStock,ean,emoji,createdAt:serverTimestamp()});
  }
  closeModal('modal-product');
  refreshCurrentView();
  updateAlertBadge();
  showToast(editingProductId?'✓ Actualizado':'✓ Producto agregado');
};

// ════════════════════════════════════════
// SCANNER
// ════════════════════════════════════════
let scannerMode='sell';

window.openScanner = async function(mode) {
  scannerMode=mode;
  document.getElementById('scan-manual').value='';
  document.getElementById('scan-status').textContent='Iniciando cámara...';
  openModal('modal-scanner');
  try {
    scannerStream=await navigator.mediaDevices.getUserMedia({video:{facingMode:'environment'}});
    const v=document.getElementById('scan-video');
    v.srcObject=scannerStream; await v.play();
    document.getElementById('scan-status').textContent='Apunta al código de barras';
  } catch(e) {
    document.getElementById('scan-status').textContent='Cámara no disponible — usa el campo o la pistola lectora ↓';
  }
};

window.closeScanner = function() {
  if(scannerStream){scannerStream.getTracks().forEach(t=>t.stop());scannerStream=null;}
  const v=document.getElementById('scan-video');
  if(v)v.srcObject=null;
  closeModal('modal-scanner');
};

window.processManual = function() {
  const val=document.getElementById('scan-manual').value.trim();
  if(!val)return;
  processBarcode(val);
  closeScanner();
};

function processBarcode(code) {
  const p=products.find(x=>x.ean===code);
  if(scannerMode==='sell'){
    if(p){addToCart(p.id);showToast(`✓ ${p.name}`);}
    else showToast(`Código ${code} no registrado`);
  } else {
    document.getElementById('pm-ean').value=code;
    showToast(`Código capturado`);
    closeScanner();
  }
}

window.scanForProduct = function() { openScanner('product'); };

// Pistola lectora HID
function handleGun(e) {
  if(['INPUT','TEXTAREA','SELECT'].includes(document.activeElement?.tagName))return;
  if(document.getElementById('modal-scanner').classList.contains('open'))return;
  if(e.key==='Enter'&&gunBuffer.length>3){processBarcode(gunBuffer);gunBuffer='';return;}
  if(e.key.length===1&&!e.ctrlKey&&!e.altKey){
    gunBuffer+=e.key;
    clearTimeout(gunTimer);
    gunTimer=setTimeout(()=>{gunBuffer='';},150);
  }
}

// ════════════════════════════════════════
// AUTH UI
// ════════════════════════════════════════
window.showAuthTab = function(tab) {
  document.getElementById('auth-register').style.display=tab==='register'?'block':'none';
  document.getElementById('auth-login').style.display=tab==='login'?'block':'none';
  document.querySelectorAll('.auth-tab').forEach(t=>t.classList.remove('active'));
  document.getElementById('tab-'+tab).classList.add('active');
};

function setAuthLoading(v) {
  const btns=document.querySelectorAll('.btn-auth');
  btns.forEach(b=>{b.disabled=v;b.textContent=v?'Cargando...':b.dataset.label;});
}

// ════════════════════════════════════════
// UTILS
// ════════════════════════════════════════
function fmt(n){return '$'+Math.round(n||0).toLocaleString('es-CL');}

window.openModal = function(id){document.getElementById(id).classList.add('open');};
window.closeModal = function(id){
  if(id==='modal-scanner')closeScanner();
  else document.getElementById(id).classList.remove('open');
};

function showToast(msg,dur=2500){
  const t=document.getElementById('toast');
  t.textContent=msg;t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),dur);
}

// Close on overlay click
document.addEventListener('click',e=>{
  if(e.target.classList.contains('modal-overlay')){
    if(e.target.id==='modal-scanner')closeScanner();
    else e.target.classList.remove('open');
  }
});

// Manual scan enter
document.addEventListener('DOMContentLoaded',()=>{
  document.getElementById('scan-manual')?.addEventListener('keydown',e=>{if(e.key==='Enter')processManual();});
  showAuthTab('login');
  if(DEMO_MODE){
    document.getElementById('demo-notice').style.display='block';
  }
});
</script>

<style>
:root{
  --bg:#0d0d10;--s1:#141418;--s2:#1c1c22;--s3:#222228;

*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}

/* ── AUTH ── */
#auth-screen{position:fixed;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:1.5rem;background:radial-gradient(ellipse at 20% 10%,#0d2a1a 0%,var(--bg) 60%)}

.auth-tabs{display:flex;gap:.5rem;margin-bottom:1.25rem;background:var(--s2);border-radius:12px;padding:.3rem}
.auth-tab{flex:1;padding:.55rem;border:none;background:none;color:var(--muted);font-family:'Epilogue',sans-serif;font-size:.85rem;border-radius:9px;cursor:pointer;transition:all .2s}
.auth-tab.active{background:var(--acc);color:#0d0d10;font-weight:600}
.field{margin-bottom:.85rem}
.field label{font-size:.75rem;color:var(--muted);display:block;margin-bottom:.35rem}
.field input,.field select{width:100%;padding:.75rem .9rem;background:var(--s2);border:1px solid var(--border);border-radius:10px;color:var(--text);font-family:'Epilogue',sans-serif;font-size:.92rem;outline:none;transition:border-color .2s;-webkit-appearance:none}

.btn-auth{width:100%;padding:.9rem;background:var(--acc);color:#0d0d10;border:none;border-radius:12px;font-family:'Syne',sans-serif;font-weight:800;font-size:1rem;cursor:pointer;transition:opacity .2s;margin-top:.25rem}

#app{display:flex;flex-direction:column;height:100%}

.tb-mode{font-size:.68rem}
.btn-out{background:none;border:1px solid var(--border);color:var(--muted);padding:.35rem .75rem;border-radius:8px;font-size:.75rem;cursor:pointer;font-family:'Epilogue',sans-serif;transition:all .2s}
.btn-out:hover{color:var(--text);border-color:var(--text)}
#main-content{flex:1;overflow:hidden}
.bottom-nav{display:flex;background:var(--s1);border-top:1px solid var(--border);flex-shrink:0}
.nv{flex:1;display:flex;flex-direction:column;align-items:center;gap:.2rem;padding:.6rem .4rem;border:none;background:none;color:var(--muted);font-size:.68rem;font-family:'Epilogue',sans-serif;cursor:pointer;transition:color .2s;position:relative}
.nv span{font-size:1.2rem}
.nv.active{color:var(--acc)}
.nbadge{background:var(--danger);color:#fff;font-size:.58rem;padding:.1rem .3rem;border-radius:20px;font-style:normal;font-weight:700;min-width:14px;text-align:center;position:absolute;top:.35rem;right:calc(50% - 16px)}

/* ── VENDER ── */
.sbox{flex:1;display:flex;align-items:center;gap:.6rem;background:var(--s2);border:1px solid var(--border);border-radius:12px;padding:.65rem .9rem}
.scan-btn{background:var(--acc);color:#0d0d10;border:none;border-radius:10px;width:44px;height:44px;font-size:1.15rem;cursor:pointer;flex-shrink:0;transition:opacity .2s}
.scan-btn:hover{opacity:.85}
.pgrid{display:grid;grid-template-columns:1fr 1fr;gap:.6rem;padding:.4rem .8rem;overflow-y:auto;flex:1}
.pcard{background:var(--s1);border:1px solid var(--border);border-radius:var(--r);padding:.85rem .8rem;cursor:pointer;transition:all .2s;position:relative;overflow:hidden}
.pcard::before{content:'';position:absolute;top:0;left:0;right:0;height:2px}
.pcard.ok::before{background:var(--ok)}
.pcard.low::before{background:var(--warn)}
.pcard.out::before{background:var(--danger)}
.pcard:hover{border-color:var(--acc);transform:translateY(-2px)}
.pcard:active{transform:scale(.97)}
.pcard.out{opacity:.45;pointer-events:none}

.cart-panel{padding:.7rem .8rem .85rem;flex-shrink:0;border-top:1px solid var(--border);background:var(--s1)}
.cart-item{display:flex;align-items:center;gap:.5rem;background:var(--s2);border-radius:9px;padding:.5rem .7rem}
.cnt-badge{background:var(--acc);color:#0d0d10;font-size:.65rem;padding:.12rem .42rem;border-radius:20px;font-family:'Syne',sans-serif;font-weight:800;display:none}

.adot{width:9px;height:9px;border-radius:50%;flex-shrink:0}
.adot.r{background:var(--danger);box-shadow:0 0 7px var(--danger)}
.adot.w{background:var(--warn);box-shadow:0 0 7px var(--warn)}

.scan-box{width:100%;aspect-ratio:1;background:#000;border-radius:12px;overflow:hidden;position:relative;margin-bottom:.85rem}
#scan-video{width:100%;height:100%;object-fit:cover}
.scan-frame{position:absolute;inset:0;display:flex;align-items:center;justify-content:center}
.scan-corners{width:60%;aspect-ratio:1;border:2px solid var(--acc);border-radius:10px;position:relative}
.scan-line{position:absolute;left:8%;right:8%;height:2px;background:var(--acc);box-shadow:0 0 8px var(--acc);animation:scanAnim 2s ease-in-out infinite}
.scan-manual-row{display:flex;gap:.6rem}
.scan-manual-row input{flex:1;padding:.7rem .9rem;background:var(--s2);border:1px solid var(--border);border-radius:10px;color:var(--text);font-family:'Epilogue',sans-serif;font-size:.92rem;outline:none}
.scan-manual-row input:focus{border-color:var(--acc)}
.sale-total-big{font-family:'Syne',sans-serif;font-weight:800;font-size:2.5rem;color:var(--acc);text-align:center;padding:1.25rem 0}

/* TOAST */
.toast{position:fixed;bottom:5.5rem;left:50%;transform:translateX(-50%) translateY(60px);background:var(--s1);border:1px solid var(--acc);color:var(--acc);font-family:'Syne',sans-serif;font-weight:700;padding:.6rem 1.2rem;border-radius:30px;font-size:.82rem;z-index:500;transition:transform .3s;white-space:nowrap;pointer-events:none}
.toast.show{transform:translateX(-50%) translateY(0)}

@keyframes slideUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
@keyframes scanAnim{0%,100%{top:10%}50%{top:85%}}
</style>

<!-- ══════ APP ══════ -->
<div id="app" class="hidden">
  <div class="topbar">
    <div class="tb-logo">SB</div>
    <div class="tb-center">
      <div class="tb-name" id="tb-name"></div>
      <div class="tb-mode" id="tb-mode"></div>
    </div>
    <button class="btn-out" onclick="doLogout()">⬅ Salir</button>
  </div>
  <div id="main-content" style="flex:1;overflow:hidden;display:flex;flex-direction:column"></div>
  <div class="bottom-nav" id="bottom-nav"></div>
</div>

<!-- ══════ SCANNER MODAL ══════ -->
<div id="modal-scanner" class="modal-overlay">
  <div class="modal-sheet">
    <h3>📷 Escanear código</h3>
    <div class="scan-box">
      <video id="scan-video" playsinline autoplay muted></video>
      <div class="scan-frame"><div class="scan-corners"><div class="scan-line"></div></div></div>
    </div>
    <div id="scan-status" style="text-align:center;font-size:.8rem;color:var(--muted);margin-bottom:.75rem">Apunta al código de barras</div>
    <div class="scan-manual-row">
      <input id="scan-manual" type="text" placeholder="Ingresa código manual o usa pistola lectora">
      <button class="mbtn-ok" style="flex:0;padding:.7rem 1rem" onclick="processManual()">OK</button>
    </div>
    <div class="mbtn-row"><button class="mbtn-cancel" style="flex:1" onclick="closeScanner()">Cancelar</button></div>
  </div>
</div>

<!-- ══════ PRODUCT MODAL ══════ -->
<div id="modal-product" class="modal-overlay">
  <div class="modal-sheet">
    <h3 id="pm-title">Agregar producto</h3>
    <div class="field"><label>Nombre</label><input id="pm-name" type="text" placeholder="Coca-Cola 1.5L"></div>
    <div class="modal-grid">
      <div class="field"><label>Precio venta ($)</label><input id="pm-price" type="number" placeholder="1500"></div>
      <div class="field"><label>Precio costo ($)</label><input id="pm-cost" type="number" placeholder="900"></div>
      <div class="field"><label>Stock actual</label><input id="pm-stock" type="number" placeholder="24"></div>
      <div class="field"><label>Stock mínimo</label><input id="pm-min" type="number" placeholder="5"></div>
    </div>
    <div class="field">
      <label>Código de barras (EAN)</label>
      <div style="display:flex;gap:.5rem">
        <input id="pm-ean" type="text" placeholder="7801234567890" style="flex:1">
        <button onclick="scanForProduct()" style="padding:.75rem 1rem;background:var(--s2);border:1px solid var(--border);border-radius:10px;cursor:pointer;font-size:1rem">📷</button>
      </div>
    </div>
    <div class="field"><label>Emoji</label><input id="pm-emoji" type="text" placeholder="🥤" maxlength="2"></div>
    <div class="mbtn-row">
      <button class="mbtn-cancel" onclick="closeModal('modal-product')">Cancelar</button>
      <button class="mbtn-ok" onclick="saveProduct()">Guardar</button>
    </div>
  </div>
</div>

<!-- ══════ SALE MODAL ══════ -->
<div id="modal-sale" class="modal-overlay">
  <div class="modal-sheet">
    <h3>Confirmar cobro</h3>
    <div id="ms-items" style="font-size:.82rem;color:var(--muted);text-align:center"></div>
    <div class="sale-total-big" id="ms-total"></div>
    <div class="mbtn-row">
      <button class="mbtn-cancel" onclick="closeModal('modal-sale')">Cancelar</button>
      <button class="mbtn-ok" onclick="completeSale()">✓ Cobrado</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>
</body>
</html>
